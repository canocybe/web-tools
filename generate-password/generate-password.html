<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/icon.svg">
    <title>PassGen - Secure & Simple</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family:monospace;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        h2 { margin-bottom: 1.5rem; text-align: center; color: var(--primary); }

        /* Password Display Area */
        .result-wrapper {
            position: relative;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #passwordResult {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.1rem;
            word-break: break-all;
            margin-right: 10px;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover { background: var(--primary-hover); }

        /* Settings Style */
        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        input[type="number"] {
            width: 50px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .generate-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .generate-btn:active { transform: scale(0.98); }

        /* Notification */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>PassGen - Secure & Simple</h2>
    
    <div class="result-wrapper">
        <span id="passwordResult">P4ssw0rd!</span>
        <button class="copy-btn" id="copyBtn">Salin</button>
    </div>
    
    <div class="setting">
        <label>Panjang Karakter</label>
        <input type="number" id="length" min="6" max="50" value="8">
    </div>
    
    <div class="setting">
        <label>Gunakan Angka (0-9)</label>
        <input type="checkbox" id="numbers" checked>
    </div>
    
    <div class="setting">
        <label>Gunakan Simbol (!@#)</label>
        <input type="checkbox" id="symbols" checked>
    </div>
    
    <button class="generate-btn" id="generateBtn">Buat Password Baru</button>
</div>

<div id="toast">Berhasil disalin!</div>

<script>
    const resultEl = document.getElementById('passwordResult');
    const lengthEl = document.getElementById('length');
    const numbersEl = document.getElementById('numbers');
    const symbolsEl = document.getElementById('symbols');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const toast = document.getElementById('toast');

    function generatePassword() {
        const length = +lengthEl.value;
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const nums = "0123456789";
        const syms = "!@#$%&*()=-";
        
        let charPool = charset;
        if (numbersEl.checked) charPool += nums;
        if (symbolsEl.checked) charPool += syms;

        let password = "";
        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() * charPool.length);
            password += charPool[randomIndex];
        }
        
        resultEl.innerText = password;
    }

    // Fitur Copy to Clipboard
    copyBtn.addEventListener('click', () => {
        const pass = resultEl.innerText;
        if (!pass || pass === "P4ssw0rd!") return;

        navigator.clipboard.writeText(pass).then(() => {
            // Tampilkan notifikasi "Berhasil"
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        });
    });

    generateBtn.addEventListener('click', generatePassword);
</script>

</body>
</html>
