<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="theme-color" content="#FFFFFF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Judul Blog -->
  <title></title>
  <!-- Link untuk Favicon Blog -->
  <link rel="icon" type="image/x-icon" href="/assets/icon.svg">
  <!-- Link Penghubung ke Main CSS -->
  <link rel="stylesheet" href="/old-personal-website-001/assets/css/main-style.css" />
  <link rel="stylesheet" href="/old-personal-website-001/assets/css/post-style.css" />
</head>

<body class="halaman-post">
  <!-- Bagian Header -->
  <div id="header" class="header">
    <!-- Logo dan Nama Blog -->
    <div id="header-logo" class="header-logo">
      <a href="" id="header-logo-link" class="header-logo-link">
        <img id="header-logo-link-img" src="" alt="logo">
        <span id="header-logo-link-span"></span>
      </a>
    </div>
    <!-- Menu Blog -->
    <div id="header-menu" class="header-menu">
      <ul class="link-header-menu" id="linkHeaderMenu">
        <span id="close-btn" class="close-btn" onclick="closeNav()"></span>
        <li><a id="link-header-menu-list-1" href=""></a></li>
        <li><a id="link-header-menu-list-2" href=""></a></li>
        <li onclick="toggleDropdown(this)">
          <a id="link-header-menu-list-3"></a>
          <div class="dropdown">
            <a id="menu-list-anime-dropdown-1" href=""></a>
            <a id="menu-list-anime-dropdown-2" href=""></a>
            <a id="menu-list-anime-dropdown-3" href=""></a>
            <a id="menu-list-anime-dropdown-4" href=""></a>
            <a id="menu-list-anime-dropdown-5" href=""></a>
          </div>
        </li>
        <li onclick="toggleDropdown(this)">
          <a id="link-header-menu-list-4"></a>
          <div class="dropdown">
            <a id="menu-list-program-dropdown-1" href=""></a>
            <a id="menu-list-program-dropdown-2" href=""></a>
          </div>
        </li>
        <li><a id="link-header-menu-list-5" href=""></a></li>
      </ul>
      <div id="burger" class="burger" onclick="toggleNav()"></div>
    </div>
    <!-- Pencarian Blog -->
    <div class="search-container" id="searchBox">
      <span class="search-icon" onclick="expandSearch()"><img id="search-icon" src=""></span>
      <input type="text" id="search" class="search-input" placeholder="" />
      <div id="suggestions" class="suggestion-box"></div>
      <span class="close-icon" id="search-close-icon" onclick="collapseSearch()"></span>
    </div>
  </div>

  <!-- Bagian Main -->
  <div id="main" class="main">
    <!-- Semua Isi Artikel Blog -->
    <div id="konten"></div>

    <div id="post-pagination" class="post-pagination"></div>

    <!-- Menu Home dan Scroll Up Blog -->
    <div class="menukonten">
      <button onclick="scrollToTop()" id="scrollBtn">▲</button>
    </div>
  </div>

  <!-- Bagian Footer -->
  <div id="footer" class="footer hidden">
    <div class="footer-about">
      <p id="footer-about-item"></p>
    </div>

    <!-- Copyright Blog -->
    <div id="footer-copyright" class="footer-copyright">
      <span id="copyright-item"></span>
    </div>
  </div>

  <!-- Link Penghubung ke Elemen Javascript -->
  <script src="/old-personal-website-001/assets/js/elemen-script.js" defer></script>
  <!-- Link Penghubung ke Main Javascript -->
  <script src="/old-personal-website-001/assets/js/post-script.js" defer></script>
</body>

</html>
