<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/assets/icon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi Barcode Generator (JsBarcode)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f9f9f9;
      color: #333;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }

    textarea,
    select,
    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      resize: vertical;
      cursor: pointer;
    }

    button {
      background: #4CAF50;
      color: #fff;
      border: none;
      transition: background 0.3s;
    }

    button:hover {
      background: #429744;
    }

    #output {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
      justify-content: center;
    }

    .barcode-item {
      text-align: center;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      width: 320px;
      flex: 1 1 320px;
    }

    .barcode-item svg {
      width: 300px;
      height: 100px;
    }

    #slideContainer {
      text-align: center;
      margin-top: 20px;
    }

    #slideContainer .barcode-item {
      display: none;
      margin: 0 auto;
    }

    #slideContainer .barcode-item.active {
      display: block;
    }

    #slideControls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h2>Generate Barcode (JsBarcode)</h2>
  <div class="controls">
    <textarea id="inputText" rows="8" placeholder="Masukkan teks, satu per baris..."></textarea>

    <label for="format">Pilih Format Barcode:</label>
    <select id="format">
      <option value="CODE128">CODE128 (default)</option>
      <option value="EAN13">EAN13</option>
      <option value="UPC">UPC</option>
      <option value="CODE39">CODE39</option>
      <option value="ITF">ITF</option>
      <option value="MSI">MSI</option>
    </select>

    <label for="mode">Pilih Mode Tampilan:</label>
    <select id="mode">
      <option value="default">Default</option>
      <option value="slide">Slide</option>
    </select>

    <button id="generateBtn">Generate Barcodes</button>
    <small>Tips: Tekan <b>Ctrl+Enter</b> untuk langsung generate.</small>
  </div>

  <div id="output"></div>
  <div id="slideContainer"></div>
  <div id="slideControls" style="display:none;">
    <button id="prevBtn">← Sebelumnya</button>
    <button id="nextBtn">Berikutnya →</button>
  </div>

  <!-- Library JsBarcode -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script>
    let currentSlide = 0;
    let slideItems = [];

    function validateInput(line, format) {
      if (format === "EAN13") {
        if (!/^\d{12}$/.test(line)) {
          return "EAN13 harus 12 digit angka.";
        }
      } else if (format === "UPC") {
        if (!/^\d{11}$/.test(line)) {
          return "UPC harus 11 digit angka.";
        }
      }
      // Format lain lebih fleksibel, cukup cek tidak kosong
      if (!line.trim()) {
        return "Input tidak boleh kosong.";
      }
      return null; // valid
    }

    function generateBarcodes() {
      const mode = document.getElementById('mode').value;
      const format = document.getElementById('format').value;
      const lines = document.getElementById('inputText').value.trim().split('\n').filter(l => l.trim() !== '');

      const output = document.getElementById('output');
      const slideContainer = document.getElementById('slideContainer');
      const slideControls = document.getElementById('slideControls');

      output.innerHTML = '';
      slideContainer.innerHTML = '';
      slideControls.style.display = 'none';

      function createBarcode(line, index, container) {
        const wrapper = document.createElement('div');
        wrapper.className = 'barcode-item';

        const label = document.createElement('p');
        label.textContent = `Baris ${index + 1}: ${line}`;

        const errorMsg = validateInput(line, format);
        if (errorMsg) {
          const error = document.createElement('p');
          error.style.color = "red";
          error.textContent = `❌ Error: ${errorMsg}`;
          wrapper.appendChild(label);
          wrapper.appendChild(error);
          container.appendChild(wrapper);
          return;
        }

        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        JsBarcode(svg, line, {
          format: format,
          lineColor: "#000",
          width: 2,
          height: 80,
          displayValue: true,
          margin: 10,
          fontSize: 14,
          textMargin: 5,
          flat: true
        });

        wrapper.appendChild(label);
        wrapper.appendChild(svg);
        container.appendChild(wrapper);
      }

      if (mode === 'default') {
        lines.forEach((line, index) => createBarcode(line, index, output));
      } else if (mode === 'slide') {
        lines.forEach((line, index) => createBarcode(line, index, slideContainer));
        slideItems = slideContainer.querySelectorAll('.barcode-item');
        currentSlide = 0;
        showSlide(currentSlide);
        slideControls.style.display = 'flex';
      }
    }

    function showSlide(index) {
      slideItems.forEach((item, i) => {
        item.classList.toggle('active', i === index);
      });
    }

    document.getElementById('generateBtn').addEventListener('click', generateBarcodes);

    // Ctrl+Enter untuk generate
    document.getElementById('inputText').addEventListener('keydown', function (event) {
      if (event.key === 'Enter' && event.ctrlKey) {
        event.preventDefault();
        generateBarcodes();
      }
    });

    document.getElementById('prevBtn').addEventListener('click', function () {
      if (currentSlide > 0) {
        currentSlide--;
        showSlide(currentSlide);
      }
    });

    document.getElementById('nextBtn').addEventListener('click', function () {
      if (currentSlide < slideItems.length - 1) {
        currentSlide++;
        showSlide(currentSlide);
      }
    });
  </script>

</body>

</html>
